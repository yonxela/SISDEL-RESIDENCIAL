<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISDEL - Panel Administrador</title>
    <meta name="description" content="Panel de administración de condominio SISDEL.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Background Decor -->
    <div class="bg-decor">
        <div class="decor-1"></div>
        <div class="decor-2"></div>
    </div>

    <div class="page-container">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" width="24" height="24">
                        <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                </div>
                <div class="brand-text">
                    <h1 id="condoNameHeader">SISDEL</h1>
                    <p>Panel Administrador</p>
                </div>
            </div>
            <div class="top-bar-actions">
                <button class="btn btn-ghost btn-icon theme-toggle" id="themeToggle" title="Cambiar Tema">
                    <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path id="moonPath" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                        <circle id="sunCircle" cx="12" cy="12" r="5" style="display:none;" />
                    </svg>
                </button>
                <button class="btn btn-ghost btn-icon" id="btnMessages" title="Mensajes" style="position:relative;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                </button>
                <span id="adminName" class="badge badge-info" style="font-size:0.7rem;"></span>
                <button class="btn btn-ghost btn-sm" id="btnLogout">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    Salir
                </button>
            </div>
        </header>

        <div class="page-content">
            <div id="messagesBanner" style="display:none;"></div>

            <!-- Stats -->
            <div class="stats-grid" id="statsGrid"></div>

            <!-- Tabs -->
            <div class="tabs" id="mainTabs">
                <button class="tab active" data-tab="vecinos">🏠 Vecinos</button>
                <button class="tab" data-tab="policias">👮 Guardias</button>
                <button class="tab" data-tab="admins">⚙️ Admins</button>
                <button class="tab" data-tab="todos">📋 Todos</button>
            </div>

            <!-- Action bar -->
            <div
                style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; gap:1rem; flex-wrap:wrap;">
                <div class="input-group" style="max-width:300px; flex:1;">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    </span>
                    <input type="text" class="form-input" id="searchInput" placeholder="Buscar por nombre o casa...">
                </div>
                <button class="btn btn-primary btn-sm" id="btnNewUser">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Agregar Usuario
                </button>
            </div>

            <div id="usersList"></div>

            <!-- Tab Content: Mensajes -->
            <div id="tabMensajes" style="display:none;">
                <div class="card" style="padding:1.5rem; margin-bottom:2rem;">
                    <h3 style="margin-bottom:1.25rem;">✉️ Enviar Mensaje</h3>
                    <form id="msgForm">
                        <div class="form-group">
                            <label>Destinatario</label>
                            <select class="form-input" id="msgTarget" required>
                                <option value="all">📢 Todos (Vecinos + Guardias)</option>
                                <option value="vecino">🏠 Solo Vecinos</option>
                                <option value="policia">👮 Solo Guardias / Policías</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Asunto</label>
                            <input type="text" class="form-input" id="msgSubject" placeholder="Título del mensaje" required>
                        </div>
                        <div class="form-group">
                            <label>Mensaje</label>
                            <textarea class="form-input" id="msgBody" placeholder="Escriba el mensaje aquí..." rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%;">📨 Enviar Mensaje</button>
                    </form>
                </div>
                <h3 style="margin-bottom:1rem;">Mensajes Enviados</h3>
                <div id="sentMsgList"></div>
            </div>
        </div>

        <footer class="app-footer">
            Software desarrollado por <strong>SISDEL INTERNATIONAL</strong> &copy; 2026 &reg;
        </footer>
    </div>

    <!-- Modal Nuevo Usuario -->
    <div class="modal-overlay" id="modalNewUser" style="display:none;">
        <div class="modal" style="max-width:450px;">
            <div class="modal-header">
                <h3>Agregar Nuevo Usuario</h3>
                <button class="btn btn-ghost btn-icon" id="btnCloseNewUser">&times;</button>
            </div>
            <form id="newUserForm" style="padding:1.5rem;">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" class="form-input" id="newUserName" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label>Rol del Usuario</label>
                    <select class="form-input" id="newUserRole" required>
                        <option value="vecino">Vecino / Residente</option>
                        <option value="policia">Policía / Guardia de Garita</option>
                        <option value="admin">Co-Administrador</option>
                    </select>
                </div>
                <div class="form-group" id="groupCasa">
                    <label>Casa o Lote <span style="color:var(--danger);">*</span></label>
                    <input type="text" class="form-input" id="newUserCasa" placeholder="Ej. Casa 12" required>
                </div>
                <div class="form-group" id="groupPlates">
                    <label>🚗 Placas de Vehículos</label>
                    <input type="text" class="form-input" id="newUserPlates" placeholder="Ej. P123ABC, M456DEF" style="text-transform:uppercase;">
                    <p class="text-xs text-muted" style="margin-top:0.25rem;">Separe múltiples placas con coma (,). Se registrarán automáticamente.</p>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Teléfono <span style="color:var(--danger);">*</span></label>
                        <input type="tel" class="form-input" id="newUserPhone" required>
                    </div>
                    <div class="form-group">
                        <label>Email (Opcional)</label>
                        <input type="email" class="form-input" id="newUserEmail">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Crear Usuario y
                    Generar Código</button>
            </form>
        </div>
    </div>

    <!-- Modal Editar Usuario -->
    <div class="modal-overlay" id="modalEditUser" style="display:none;">
        <div class="modal" style="max-width:450px;">
            <div class="modal-header">
                <h3>Editar Usuario</h3>
                <button class="btn btn-ghost btn-icon" id="btnCloseEditUser">&times;</button>
            </div>
            <form id="editUserForm" style="padding:1.5rem;">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" class="form-input" id="editUserName" required>
                </div>
                <div class="form-group">
                    <label>Código de Acceso</label>
                    <input type="text" class="form-input" id="editUserCode" disabled
                        style="background:var(--bg-item); opacity:0.7;">
                    <p class="text-xs text-muted" style="margin-top:0.25rem;">El código es generado por el sistema.</p>
                </div>
                <div class="form-group">
                    <label>Casa/Lote</label>
                    <input type="text" class="form-input" id="editUserCasa">
                </div>
                <div class="form-group">
                    <label>Estado de Pago</label>
                    <select class="form-input" id="editUserPayment">
                        <option value="al_dia">Al día</option>
                        <option value="moroso">Moroso</option>
                    </select>
                </div>

                <!-- Vehicle Plates Section (only for vecinos) -->
                <div class="form-group" id="editGroupPlates" style="display:none;">
                    <label>🚗 Vehículos Registrados</label>
                    <div id="editPlatesList" style="margin-bottom:0.5rem;"></div>
                    <div style="display:flex; gap:0.5rem;">
                        <input type="text" class="form-input" id="editNewPlate" placeholder="Agregar placa (ej. P123ABC)" style="text-transform:uppercase; flex:1;">
                        <button type="button" class="btn btn-primary btn-sm" id="btnAddPlate" style="white-space:nowrap;">+ Agregar</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Guardar
                    Cambios</button>
                <div style="margin-top:1rem; border-top:1px solid var(--border-subtle); padding-top:1rem;">
                    <button type="button" class="btn btn-ghost" id="btnDeleteUser"
                        style="width:100%; color:var(--danger);">Eliminar de este Condominio</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="sisdel-core.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const session = await SISDEL.requireAuth([SISDEL.ROLES.ADMIN]);
            if (!session) return;

            const condoId = session.condominioId;
            document.getElementById('condoNameHeader').textContent = session.condominioName;
            document.getElementById('adminName').textContent = session.userName;

            // --- Theme Support ---
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const applyTheme = (theme) => {
                if (theme === 'light') document.body.classList.add('light-mode');
                else document.body.classList.remove('light-mode');
                themeIcon.innerHTML = theme === 'light'
                    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
                    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />';
            };
            const currentTheme = localStorage.getItem('sisdel_theme') || 'dark';
            applyTheme(currentTheme);
            themeToggle.addEventListener('click', () => {
                const newTheme = document.body.classList.contains('light-mode') ? 'dark' : 'light';
                localStorage.setItem('sisdel_theme', newTheme);
                applyTheme(newTheme);
            });

            // --- App Logic ---
            document.getElementById('btnLogout').addEventListener('click', () => SISDEL.logout());

            // Messages button toggles to messages view
            let showingMessages = false;
            document.getElementById('btnMessages').addEventListener('click', () => {
                showingMessages = !showingMessages;
                document.getElementById('tabMensajes').style.display = showingMessages ? 'block' : 'none';
                document.getElementById('usersList').style.display = showingMessages ? 'none' : 'block';
                document.querySelector('.stats-grid').style.display = showingMessages ? 'none' : '';
                document.getElementById('searchInput').closest('div[style]').style.display = showingMessages ? 'none' : 'flex';
                document.getElementById('mainTabs').style.display = showingMessages ? 'none' : '';
                document.getElementById('btnMessages').style.background = showingMessages ? 'var(--primary-light)' : '';
                document.getElementById('btnMessages').style.color = showingMessages ? 'white' : '';
                if (showingMessages) renderSentMessages();
            });

            let currentTab = 'vecinos';
            let searchQuery = '';

            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentTab = tab.dataset.tab;
                    // If returning from messages view
                    if (showingMessages) {
                        showingMessages = false;
                        document.getElementById('tabMensajes').style.display = 'none';
                        document.getElementById('usersList').style.display = 'block';
                        document.querySelector('.stats-grid').style.display = '';
                        document.getElementById('searchInput').closest('div[style]').style.display = 'flex';
                        document.getElementById('mainTabs').style.display = '';
                        document.getElementById('btnMessages').style.background = '';
                        document.getElementById('btnMessages').style.color = '';
                    }
                    renderUsers();
                });
            });

            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderUsers();
            });

            async function renderStats() {
                const users = await SISDEL.getUsers(condoId);
                const vecinos = users.filter(u => u.role === SISDEL.ROLES.VECINO);
                const morosos = vecinos.filter(v => v.paymentStatus === SISDEL.PAYMENT_STATUS.MOROSO).length;
                const todayVisits = await SISDEL.getTodayVisits(condoId);

                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="stat-value" style="color:var(--primary-light)">${users.length}</div><div class="stat-label">Usuarios</div></div>
                    <div class="stat-card"><div class="stat-value" style="color:var(--accent)">${vecinos.length}</div><div class="stat-label">Vecinos</div></div>
                    <div class="stat-card"><div class="stat-value" style="color:var(--danger)">${morosos}</div><div class="stat-label">Morosos</div></div>
                    <div class="stat-card"><div class="stat-value" style="color:var(--warning)">${todayVisits.length}</div><div class="stat-label">Visitas Hoy</div></div>
                `;
            }

            async function renderUsers() {
                const allUsers = await SISDEL.getUsers(condoId);
                const roleMap = { vecinos: SISDEL.ROLES.VECINO, policias: SISDEL.ROLES.POLICIA, admins: SISDEL.ROLES.ADMIN, todos: null };
                const targetRole = roleMap[currentTab];
                let filtered = targetRole ? allUsers.filter(u => u.role === targetRole) : allUsers;
                if (searchQuery) {
                    filtered = filtered.filter(u => u.name.toLowerCase().includes(searchQuery) || (u.casa || '').toLowerCase().includes(searchQuery));
                }
                const list = document.getElementById('usersList');
                if (filtered.length === 0) { list.innerHTML = '<p class="text-center text-muted card" style="padding:2rem;">Sin resultados.</p>'; return; }

                list.innerHTML = filtered.map(u => `
                    <div class="list-item">
                        <div class="avatar" style="${u.paymentStatus === 'moroso' ? 'background:var(--danger);' : ''}">${u.name.charAt(0)}</div>
                        <div class="item-info">
                            <div class="item-name">${u.name} <code style="font-size:0.75rem; color:var(--accent);">${u.accessCode}</code></div>
                            <div class="item-detail">${SISDEL.getRoleName(u.role)} ${u.casa ? '· ' + u.casa : ''}</div>
                        </div>
                        <div style="display:flex; gap:0.5rem; align-items:center;">
                            ${u.paymentStatus ? SISDEL.getPaymentBadge(u.paymentStatus) : ''}
                            <div class="custom-tooltip">
                                <button class="btn btn-ghost btn-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--primary-light);">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                                <div class="custom-tooltip-text">
                                    <strong style="color:var(--primary-light);">${u.name}</strong><br>
                                    Tel: ${u.phone || 'N/A'}<br>
                                    Email: ${u.email || 'N/A'}<br>
                                    Casa: ${u.casa || 'N/A'}
                                </div>
                            </div>
                            <button class="btn btn-ghost btn-icon" onclick="openEditUser('${u.id}')" title="Editar">✏️</button>
                        </div>
                    </div>
                `).join('');
            }

            // --- Modal Actions ---
            const btnNewUser = document.getElementById('btnNewUser');
            const modalNewUser = document.getElementById('modalNewUser');
            const btnCloseNewUser = document.getElementById('btnCloseNewUser');
            const newUserForm = document.getElementById('newUserForm');

            btnNewUser.addEventListener('click', () => {
                newUserForm.reset();
                syncNewUserFields(); // Ensure fields match default role (vecino)
                modalNewUser.style.display = 'flex';
            });
            btnCloseNewUser.addEventListener('click', () => modalNewUser.style.display = 'none');

            newUserForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btnSubmit = newUserForm.querySelector('button[type="submit"]');
                btnSubmit.disabled = true;
                btnSubmit.textContent = 'Creando...';

                try {
                    const name = document.getElementById('newUserName').value;
                    const role = document.getElementById('newUserRole').value;
                    const casa = document.getElementById('newUserCasa').value;
                    const phone = document.getElementById('newUserPhone').value;
                    const email = document.getElementById('newUserEmail').value;
                    const platesRaw = document.getElementById('newUserPlates').value;

                    // Validate required fields for vecino
                    if (role === 'vecino' && !casa.trim()) {
                        SISDEL.showToast('Casa o Lote es obligatorio para vecinos', 'warning');
                        btnSubmit.disabled = false;
                        btnSubmit.textContent = 'Crear Usuario y Generar Código';
                        return;
                    }
                    if (role === 'vecino' && !phone.trim()) {
                        SISDEL.showToast('Teléfono es obligatorio para vecinos', 'warning');
                        btnSubmit.disabled = false;
                        btnSubmit.textContent = 'Crear Usuario y Generar Código';
                        return;
                    }

                    const user = await SISDEL.createUser(condoId, name, role, casa, phone, email);
                    if (user) {
                        // Auto-register vehicle plates if provided
                        let plateCount = 0;
                        if (platesRaw && role === 'vecino') {
                            const plates = platesRaw.split(',').map(p => p.trim().toUpperCase().replace(/[^A-Z0-9]/g, '')).filter(p => p.length > 0);
                            for (const plate of plates) {
                                const vehicle = await SISDEL.createVehicle(user.id, condoId, plate, '', '', '');
                                if (vehicle) plateCount++;
                            }
                        }

                        let msg = `✅ ${name} creado. Código: ${user.accessCode}`;
                        if (plateCount > 0) msg += ` | ${plateCount} vehículo(s) registrado(s)`;
                        SISDEL.showToast(msg, 'success');
                        modalNewUser.style.display = 'none';
                        newUserForm.reset();
                        await renderStats();
                        await renderUsers();
                    } else {
                        SISDEL.showToast('Error al crear usuario', 'danger');
                    }
                } catch (err) {
                    console.error('Error creating user:', err);
                    SISDEL.showToast('Error inesperado', 'danger');
                } finally {
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = 'Crear Usuario y Generar Código';
                }
            });

            function syncNewUserFields() {
                const role = document.getElementById('newUserRole').value;
                const isVecino = role === 'vecino';
                document.getElementById('groupCasa').style.display = isVecino ? 'block' : 'none';
                document.getElementById('groupPlates').style.display = isVecino ? 'block' : 'none';
                document.getElementById('newUserCasa').required = isVecino;
                document.getElementById('newUserPhone').required = isVecino;
            }

            // Handle role change to show/hide house input
            document.getElementById('newUserRole').addEventListener('change', syncNewUserFields);

            // --- Edit User Logic ---
            const modalEditUser = document.getElementById('modalEditUser');
            const btnCloseEditUser = document.getElementById('btnCloseEditUser');
            const editUserForm = document.getElementById('editUserForm');

            window.openEditUser = async function (id) {
                const user = await SISDEL.getUserById(id);
                if (!user) return;
                document.getElementById('editUserId').value = user.id;
                document.getElementById('editUserName').value = user.name;
                document.getElementById('editUserCode').value = user.accessCode;
                document.getElementById('editUserCasa').value = user.casa || '';
                document.getElementById('editUserPayment').value = user.paymentStatus || 'al_dia';
                document.getElementById('editUserPayment').parentElement.style.display = user.role === 'vecino' ? 'block' : 'none';
                
                // Show plates section only for vecinos
                const platesSection = document.getElementById('editGroupPlates');
                platesSection.style.display = user.role === 'vecino' ? 'block' : 'none';
                if (user.role === 'vecino') {
                    await renderEditPlates(user.id);
                }
                
                modalEditUser.style.display = 'flex';
            };

            // Render plates in edit modal
            async function renderEditPlates(userId) {
                const vehicles = await SISDEL.getVehicles(userId);
                const list = document.getElementById('editPlatesList');
                if (vehicles.length === 0) {
                    list.innerHTML = '<p class="text-xs text-muted" style="padding:0.5rem 0;">Sin vehículos registrados.</p>';
                    return;
                }
                list.innerHTML = vehicles.map(v => `
                    <div style="display:flex; align-items:center; justify-content:space-between; padding:0.4rem 0.75rem; background:var(--bg-item); border-radius:8px; margin-bottom:0.35rem;">
                        <span style="font-weight:600; font-family:monospace; letter-spacing:1px;">🚗 ${v.plate}</span>
                        <button type="button" class="btn btn-ghost btn-icon btn-sm" onclick="removePlate('${v.id}')" title="Eliminar placa" style="color:var(--danger); font-size:1rem;">×</button>
                    </div>
                `).join('');
            }

            // Delete plate
            window.removePlate = async function(vehicleId) {
                if (confirm('¿Eliminar este vehículo?')) {
                    if (await SISDEL.deleteVehicle(vehicleId)) {
                        SISDEL.showToast('Vehículo eliminado', 'warning');
                        const userId = document.getElementById('editUserId').value;
                        await renderEditPlates(userId);
                    }
                }
            };

            // Add plate
            document.getElementById('btnAddPlate').addEventListener('click', async () => {
                const input = document.getElementById('editNewPlate');
                const plate = input.value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
                if (!plate) {
                    SISDEL.showToast('Ingrese una placa válida', 'warning');
                    return;
                }
                const userId = document.getElementById('editUserId').value;
                const vehicle = await SISDEL.createVehicle(userId, condoId, plate, '', '', '');
                if (vehicle) {
                    SISDEL.showToast(`Placa ${plate} agregada`, 'success');
                    input.value = '';
                    await renderEditPlates(userId);
                }
            });

            // Allow Enter key to add plate
            document.getElementById('editNewPlate').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('btnAddPlate').click();
                }
            });

            btnCloseEditUser.addEventListener('click', () => modalEditUser.style.display = 'none');

            editUserForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('editUserId').value;
                const updates = {
                    name: document.getElementById('editUserName').value,
                    casa: document.getElementById('editUserCasa').value,
                    paymentStatus: document.getElementById('editUserPayment').value
                };
                if (await SISDEL.updateUser(id, updates)) {
                    SISDEL.showToast('Usuario actualizado', 'success');
                    modalEditUser.style.display = 'none';
                    await renderStats();
                    await renderUsers();
                }
            });

            document.getElementById('btnDeleteUser').addEventListener('click', async () => {
                const id = document.getElementById('editUserId').value;
                if (confirm('¿Eliminar este usuario del condominio?')) {
                    if (await SISDEL.deleteUser(id)) {
                        SISDEL.showToast('Usuario eliminado', 'warning');
                        modalEditUser.style.display = 'none';
                        await renderStats();
                        await renderUsers();
                    }
                }
            });

            // --- Messaging System ---
            async function renderSentMessages() {
                const msgs = await SISDEL.getMessages(condoId);
                const list = document.getElementById('sentMsgList');
                if (msgs.length === 0) {
                    list.innerHTML = '<p class="text-center text-muted card" style="padding:2rem;">No hay mensajes enviados.</p>';
                    return;
                }
                list.innerHTML = msgs.map(m => {
                    const targetLabel = m.toRole === 'all' ? '📢 Todos' : m.toRole === 'vecino' ? '🏠 Vecinos' : '👮 Guardias';
                    const readBadge = m.read ? '<span class="badge" style="background:var(--success);font-size:0.55rem;">LEÍDO</span>' : '<span class="badge badge-info" style="font-size:0.55rem;">NO LEÍDO</span>';
                    return `
                    <div class="list-item" style="flex-direction:column; align-items:flex-start; gap:0.5rem;">
                        <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                            <div style="display:flex; align-items:center; gap:0.5rem;">
                                <strong style="color:var(--primary-light);">${m.subject}</strong>
                                ${readBadge}
                            </div>
                            <div style="display:flex; align-items:center; gap:0.5rem;">
                                <span class="text-xs text-muted">${SISDEL.formatDateTime(m.createdAt)}</span>
                                <button class="btn btn-ghost btn-icon btn-sm" onclick="deleteMsg('${m.id}')" title="Eliminar" style="color:var(--danger);">🗑️</button>
                            </div>
                        </div>
                        <p style="margin:0; color:var(--text-secondary); font-size:0.9rem;">${m.body}</p>
                        <span class="text-xs text-muted">Para: ${targetLabel} · De: ${m.fromName}</span>
                    </div>`;
                }).join('');
            }

            window.deleteMsg = async function(id) {
                if (confirm('¿Eliminar este mensaje?')) {
                    if (await SISDEL.deleteMessage(id)) {
                        SISDEL.showToast('Mensaje eliminado', 'warning');
                        renderSentMessages();
                    }
                }
            };

            document.getElementById('msgForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const target = document.getElementById('msgTarget').value;
                const subject = document.getElementById('msgSubject').value;
                const body = document.getElementById('msgBody').value;
                const adminName = document.getElementById('adminName').textContent || 'Administración';

                const msg = await SISDEL.createMessage(condoId, adminName, target, subject, body);
                if (msg) {
                    SISDEL.showToast('✅ Mensaje enviado exitosamente', 'success');
                    document.getElementById('msgForm').reset();
                    renderSentMessages();
                } else {
                    SISDEL.showToast('Error al enviar mensaje', 'danger');
                }
            });

            await renderStats();
            await renderUsers();
        });
    </script>
</body>

</html>
